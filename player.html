<!-- プレイヤー部分 -->
<div class="player-panel">
    <audio id="audio" controls></audio>
    <div class="time-display" id="time-display">00:00 / 00:00</div>
</div>

<script>
function initPlayer() {
    const audio = document.getElementById('audio');
    const url = window.audioUrlFromPython;
    
    // URLが正常（空文字でなく、変な文字列でない）場合のみ読み込む
    if (url && url !== "/static//.m4a") {
        console.log("音声URLを読み込みます: " + url);
        audio.src = url;
        audio.load();
    } else {
        console.log("有効な音声URLがまだ届いていません。");
    }
}

// 画面読み込み時にも念のためチェック
document.addEventListener('DOMContentLoaded', initPlayer);
</script>
