<div class="player-panel">
    <audio id="audio" controls></audio>
    <div class="time-display" id="time-display">00:00 / 00:00</div>
</div>

<script>
function initPlayer() {
    const audio = document.getElementById('audio');
    const url = window.audioUrlFromPython;
    
    if (url) {
        // 前の音声をクリアして新しいURLをセット
        audio.src = url;
        audio.load();
    }
}
// Streamlitの画面更新（再レンダリング）に対応するため、常に実行を試みる
initPlayer();
</script>
