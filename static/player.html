<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* 画面いっぱいにプレイヤーを表示するためのCSS */
        body { margin: 0; padding: 0; background: transparent; font-family: sans-serif; }
        .player-panel { background: #f0f2f6; padding: 15px; border-radius: 10px; box-sizing: border-box; }
        .time-display { font-family: monospace; margin-top: 5px; color: #31333f; font-size: 14px; }
        audio { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="player-panel">
        <div id="file-title" style="font-weight: bold; color: #31333f; font-size: 14px;">音声プレイヤー</div>
        <audio id="audio" controls></audio>
        <div class="time-display" id="time-display">00:00 / 00:00</div>
    </div>

    <script>
    function loadAudioFromUrl() {
        const audio = document.getElementById('audio');
        
        // URLの「?audio=...」の後ろについている音声パスを抜き出す
        const urlParams = new URLSearchParams(window.location.search);
        const audioUrl = urlParams.get('audio');
        
        if (audioUrl) {
            console.log("音声を読み込みます: " + audioUrl);
            audio.src = audioUrl;
            audio.load();
            
            // プレイヤーのタイトルを選択されたファイル名に変える（おまけ機能）
            const fileName = audioUrl.split('/').pop();
            document.getElementById('file-title').innerText = "再生中: " + fileName;
        }
    }

    // ページが開かれたら即座に実行
    window.onload = loadAudioFromUrl;
    </script>
</body>
</html>
