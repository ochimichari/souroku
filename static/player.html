<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: sans-serif; }
        .player-panel { background: #f0f2f6; padding: 15px; border-radius: 10px; box-sizing: border-box; }
        .time-display { font-family: monospace; margin-top: 5px; color: #31333f; font-size: 14px; }
        audio { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="player-panel">
        <!-- Python側で置換されて、ここに選択されたファイル名が入ります -->
        <div id="file-title" style="font-weight: bold; color: #31333f; font-size: 14px;">音声プレイヤー</div>
        
        <!-- 🔴 Pythonから直接URLが埋め込まれます。srcに最初からデータがあるため、ぐるぐるしません -->
        <audio id="audio" controls src="%%AUDIO_URL%%"></audio>
        <div class="time-display" id="time-display">00:00 / 00:00</div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const audio = document.getElementById('audio');
        
        // 現在読み込まれているファイル名をプレイヤーのタイトルに表示する
        if (audio.src) {
            const fileName = audio.src.split('/').pop();
            document.getElementById('file-title').innerText = "再生中: " + decodeURIComponent(fileName);
            
            // 自動的に再生を開始したい場合は、以下のコメントアウトを解除してください
            // audio.play().catch(e => console.log("自動再生がブロックされました"));
        }
    });
    </script>
</body>
</html>
